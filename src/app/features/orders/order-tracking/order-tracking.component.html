<div *ngIf="booking" class="space-y-6">
  <div class="flex items-center gap-3">
    <a routerLink="/layout/orders" class="inline-flex items-center gap-2 text-sm font-bold text-slate-700 hover:text-indigo-700">
      <mat-icon class="text-[18px]">arrow_back</mat-icon>
      Back to bookings
    </a>
  </div>

  <div class="rounded-3xl border border-slate-200 bg-white shadow-sm p-6">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div>
        <p class="text-[11px] font-extrabold text-slate-500">BOOKING ID</p>
        <p class="text-xl font-extrabold text-slate-900">{{ booking.id }}</p>
        <p class="mt-1 text-sm text-slate-600">{{ booking.patientName }} • {{ booking.placedOn }}</p>
      </div>
      <span class="text-[11px] px-3 py-2 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-800 font-extrabold">
        {{ booking.status }}
      </span>
    </div>

    <div class="mt-6 grid gap-3">
      <div *ngFor="let s of steps" class="flex items-start gap-3">
        <div
          class="w-11 h-11 rounded-2xl border grid place-content-center shrink-0"
          [ngClass]="isDone(s.key) ? 'bg-emerald-50 border-emerald-200' : 'bg-slate-50 border-slate-200'"
        >
          <mat-icon [ngClass]="isDone(s.key) ? 'text-emerald-700' : 'text-slate-400'">{{ s.icon }}</mat-icon>
        </div>
        <div class="min-w-0 flex-1 pt-1">
          <p class="font-extrabold" [ngClass]="isDone(s.key) ? 'text-slate-900' : 'text-slate-500'">{{ s.label }}</p>
          <p class="text-sm" [ngClass]="isDone(s.key) ? 'text-slate-600' : 'text-slate-400'">
            {{ isDone(s.key) ? 'In progress / done' : 'Pending' }}
          </p>
        </div>
        <mat-icon *ngIf="isDone(s.key)" class="text-emerald-600">check_circle</mat-icon>
      </div>
    </div>
  </div>
</div>
