<div class="space-y-6">
  <app-section-title title="My bookings" subtitle="Track sample collection, lab processing and report readiness."></app-section-title>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-3">
    <div class="lg:col-span-2 relative">
      <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</mat-icon>
      <input
        [(ngModel)]="searchText"
        class="w-full pl-10 pr-4 py-3 rounded-2xl border border-slate-200 bg-white shadow-sm outline-none focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition"
        placeholder="Search by booking ID, patient name, test…"
      />
    </div>
    <select [(ngModel)]="statusFilter" class="px-4 py-3 rounded-2xl border border-slate-200 bg-white shadow-sm outline-none">
      <option value="">All statuses</option>
      <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
    </select>
  </div>

  <div *ngIf="filtered.length === 0">
    <app-empty-state
      icon="receipt_long"
      title="No bookings found"
      subtitle="Try a different search or browse tests to place a booking."
      actionLabel="Browse tests"
      actionLink="/layout/tests"
    ></app-empty-state>
  </div>

  <div *ngIf="filtered.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let b of filtered" class="rounded-3xl border border-slate-200 bg-white shadow-sm hover:shadow-md transition overflow-hidden">
      <div class="p-5">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-[11px] font-extrabold text-slate-500">BOOKING ID</p>
            <p class="text-lg font-extrabold text-slate-900">{{ b.id }}</p>
            <p class="mt-1 text-sm text-slate-600">{{ b.patientName }} • {{ b.placedOn }}</p>
          </div>
          <span class="text-[11px] px-3 py-2 rounded-full border font-extrabold" [ngClass]="statusClass(b.status)">
            {{ b.status }}
          </span>
        </div>

        <div class="mt-4 rounded-2xl bg-slate-50 border border-slate-200 p-4">
          <p class="text-xs font-extrabold text-slate-700">Items</p>
          <ul class="mt-2 grid gap-1 text-sm text-slate-700">
            <li *ngFor="let it of b.items">• {{ it.title }}</li>
          </ul>
        </div>

        <div class="mt-4 flex items-center justify-between">
          <p class="text-sm text-slate-600">Paid</p>
          <p class="text-lg font-extrabold text-slate-900">₹{{ b.amountPaid }}</p>
        </div>

        <div *ngIf="b.etaText" class="mt-3 text-xs text-emerald-700 font-semibold inline-flex items-center gap-2">
          <mat-icon class="text-[18px] text-emerald-700">schedule</mat-icon>
          {{ b.etaText }}
        </div>

        <div class="mt-5 grid grid-cols-2 gap-3">
          <button type="button" class="rounded-2xl px-4 py-2.5 bg-indigo-700 hover:bg-indigo-800 text-white font-extrabold transition" (click)="track(b)">
            Track
          </button>
          <a routerLink="/layout/tests" class="rounded-2xl px-4 py-2.5 bg-slate-900 hover:bg-slate-800 text-white font-extrabold transition text-center">
            Book again
          </a>
        </div>
      </div>
      <div class="h-1 bg-gradient-to-r from-emerald-500 via-sky-500 to-indigo-600"></div>
    </div>
  </div>
</div>
