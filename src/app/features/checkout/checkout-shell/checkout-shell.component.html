<div class="space-y-6">
  <app-section-title title="Checkout" subtitle="A clean, conversion-focused flow — cart → address → patient → confirmation."></app-section-title>

  <div class="rounded-3xl border border-slate-200 bg-white shadow-sm p-4 sm:p-5">
    <div class="grid grid-cols-4 gap-2 sm:gap-4">
      <button
        *ngFor="let s of steps"
        type="button"
        class="rounded-2xl px-3 py-3 sm:px-4 sm:py-4 border transition text-left"
        [ngClass]="active === s.key ? 'border-indigo-300 bg-indigo-50' : 'border-slate-200 hover:bg-slate-50'"
        (click)="go(s.route)"
        [disabled]="!s.route"
      >
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-2xl grid place-content-center border"
            [ngClass]="active === s.key ? 'bg-white border-indigo-200' : 'bg-slate-50 border-slate-200'">
            <mat-icon [ngClass]="active === s.key ? 'text-indigo-700' : 'text-slate-500'">{{ s.icon }}</mat-icon>
          </div>
          <div class="min-w-0">
            <p class="text-sm font-extrabold" [ngClass]="active === s.key ? 'text-slate-900' : 'text-slate-700'">{{ s.label }}</p>
            <p class="hidden sm:block text-xs text-slate-500">Step {{ (steps.indexOf(s) + 1) }}</p>
          </div>
        </div>
      </button>
    </div>
  </div>

  <router-outlet></router-outlet>
</div>
