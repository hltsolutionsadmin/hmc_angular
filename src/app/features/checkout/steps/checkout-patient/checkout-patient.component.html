<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <div class="lg:col-span-2 space-y-4">
    <div class="rounded-3xl border border-slate-200 bg-white shadow-sm p-5">
      <p class="text-sm font-extrabold text-slate-900">Patient details</p>
      <p class="mt-1 text-xs text-slate-600">Used for booking and report mapping.</p>

      <div class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
        <input [(ngModel)]="state.patientName" class="px-4 py-2.5 rounded-2xl border border-slate-200 bg-slate-50 outline-none sm:col-span-2" placeholder="Patient full name" />
        <input [(ngModel)]="state.patientAge" type="number" class="px-4 py-2.5 rounded-2xl border border-slate-200 bg-slate-50 outline-none" placeholder="Age" />
        <select [(ngModel)]="state.patientGender" class="px-4 py-2.5 rounded-2xl border border-slate-200 bg-slate-50 outline-none">
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
        <textarea [(ngModel)]="state.notes" rows="3" class="px-4 py-2.5 rounded-2xl border border-slate-200 bg-slate-50 outline-none sm:col-span-2" placeholder="Notes for phlebotomist (optional)"></textarea>
      </div>
    </div>

    <div class="rounded-3xl border border-slate-200 bg-white shadow-sm p-5">
      <p class="text-sm font-extrabold text-slate-900">Selected address</p>
      <p class="mt-2 text-sm text-slate-700" *ngIf="state.selectedAddress as a">
        {{ a.line1 }}<span *ngIf="a.line2">, {{ a.line2 }}</span>, {{ a.city }}, {{ a.state }} - {{ a.pincode }}
      </p>
      <a routerLink="/layout/checkout/address" class="mt-3 inline-block text-sm font-bold text-indigo-700 hover:underline">Change address</a>
    </div>
  </div>

  <aside class="space-y-4">
    <div class="rounded-3xl border border-slate-200 bg-white shadow-sm p-5">
      <p class="text-sm font-extrabold text-slate-900">Order summary</p>
      <div class="mt-3 space-y-2 text-sm text-slate-700">
        <div class="flex items-center justify-between">
          <span>Items</span>
          <span class="font-bold text-slate-900">{{ cart.count }}</span>
        </div>
        <div class="flex items-center justify-between">
          <span>Total</span>
          <span class="font-extrabold text-slate-900">₹{{ cart.subtotal() }}</span>
        </div>
      </div>

      <button
        type="button"
        class="mt-4 w-full inline-flex items-center justify-center gap-2 rounded-2xl px-5 py-3 bg-indigo-700 hover:bg-indigo-800 text-white font-extrabold shadow-sm transition"
        (click)="continue()"
      >
        Continue to payment
        <mat-icon class="text-[18px]">arrow_forward</mat-icon>
      </button>
    </div>
  </aside>
</div>
