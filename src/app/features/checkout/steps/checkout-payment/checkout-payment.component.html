<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
  <div class="lg:col-span-2 space-y-4">
    <div class="rounded-3xl border border-slate-200 bg-white shadow-sm p-5">
      <p class="text-sm font-extrabold text-slate-900">Payment</p>
      <p class="mt-1 text-xs text-slate-600">Payment UI placeholder — integrate gateway later.</p>

      <div class="mt-4 grid gap-3">
        <label class="rounded-3xl border p-4 cursor-pointer transition" [ngClass]="method === 'upi' ? 'border-indigo-300 ring-4 ring-indigo-100' : 'border-slate-200 hover:bg-slate-50'">
          <input class="hidden" type="radio" name="m" value="upi" [(ngModel)]="method" />
          <div class="flex items-center gap-3">
            <mat-icon class="text-indigo-700">qr_code_2</mat-icon>
            <div class="min-w-0">
              <p class="font-extrabold text-slate-900">UPI</p>
              <p class="text-xs text-slate-600">Fast and secure</p>
            </div>
            <mat-icon class="ml-auto text-emerald-600" *ngIf="method === 'upi'">check_circle</mat-icon>
          </div>
        </label>

        <label class="rounded-3xl border p-4 cursor-pointer transition" [ngClass]="method === 'card' ? 'border-indigo-300 ring-4 ring-indigo-100' : 'border-slate-200 hover:bg-slate-50'">
          <input class="hidden" type="radio" name="m" value="card" [(ngModel)]="method" />
          <div class="flex items-center gap-3">
            <mat-icon class="text-indigo-700">credit_card</mat-icon>
            <div class="min-w-0">
              <p class="font-extrabold text-slate-900">Card</p>
              <p class="text-xs text-slate-600">Debit / Credit</p>
            </div>
            <mat-icon class="ml-auto text-emerald-600" *ngIf="method === 'card'">check_circle</mat-icon>
          </div>
        </label>

        <label class="rounded-3xl border p-4 cursor-pointer transition" [ngClass]="method === 'cod' ? 'border-indigo-300 ring-4 ring-indigo-100' : 'border-slate-200 hover:bg-slate-50'">
          <input class="hidden" type="radio" name="m" value="cod" [(ngModel)]="method" />
          <div class="flex items-center gap-3">
            <mat-icon class="text-indigo-700">payments</mat-icon>
            <div class="min-w-0">
              <p class="font-extrabold text-slate-900">Pay later</p>
              <p class="text-xs text-slate-600">On sample pickup</p>
            </div>
            <mat-icon class="ml-auto text-emerald-600" *ngIf="method === 'cod'">check_circle</mat-icon>
          </div>
        </label>
      </div>
    </div>
  </div>

  <aside class="space-y-4">
    <div class="rounded-3xl border border-slate-200 bg-white shadow-sm p-5">
      <p class="text-sm font-extrabold text-slate-900">Payable</p>
      <p class="mt-2 text-2xl font-extrabold text-slate-900">₹{{ (payable$ | async) ?? 0 }}</p>
      <p class="mt-1 text-xs text-slate-600">Includes all discounts shown in cart.</p>

      <button
        type="button"
        class="mt-4 w-full inline-flex items-center justify-center gap-2 rounded-2xl px-5 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold shadow-sm transition disabled:opacity-60"
        (click)="placeOrder()"
        [disabled]="placing"
      >
        <span *ngIf="!placing">Place booking</span>
        <span *ngIf="placing">Booking…</span>
        <mat-icon class="text-[18px]">verified</mat-icon>
      </button>

      <div class="mt-4 rounded-2xl bg-slate-50 border border-slate-200 p-4 text-xs text-slate-700">
        <div class="flex items-start gap-2">
          <mat-icon class="text-[18px] text-indigo-700">security</mat-icon>
          <p>We follow safe, hygienic sample collection guidelines.</p>
        </div>
      </div>
    </div>
  </aside>
</div>
