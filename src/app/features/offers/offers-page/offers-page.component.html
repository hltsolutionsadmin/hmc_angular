<div class="space-y-6">
  <app-section-title title="Offers & coupons" subtitle="Discounts designed like a premium e-commerce platform — clear and easy to apply."></app-section-title>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <app-offer-card *ngFor="let o of offers" [offer]="o"></app-offer-card>
  </div>

  <div class="rounded-3xl border border-slate-200 bg-white shadow-sm p-5">
    <p class="text-sm font-extrabold text-slate-900">Available coupons</p>
    <div class="mt-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div *ngFor="let c of coupons" class="rounded-3xl border border-slate-200 bg-slate-50 p-5">
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-[11px] font-extrabold text-white inline-flex px-2.5 py-1.5 rounded-full bg-slate-900">{{ c.code }}</p>
            <p class="mt-2 text-sm font-bold text-slate-900">{{ c.desc }}</p>
          </div>
          <span class="text-[11px] px-2 py-1 rounded-full bg-indigo-50 border border-indigo-200 text-indigo-700 font-bold">{{ c.tag }}</span>
        </div>
        <div class="mt-4 flex items-center gap-2 text-xs text-slate-600">
          <mat-icon class="text-[18px] text-emerald-700">info</mat-icon>
          Apply on cart during checkout.
        </div>
      </div>
    </div>
  </div>
</div>
