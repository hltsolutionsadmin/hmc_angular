<div class="space-y-5">
  <app-section-title
    title="Browse tests"
    subtitle="A Myntra-style browsing experience — premium cards, quick filters, and cart-ready actions."
    [actionLabel]="'Go Back'"
    actionLink="/layout/home"
  ></app-section-title>

  <!-- Search + controls -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-3">
    <div class="lg:col-span-2">
      <div class="relative">
        <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</mat-icon>
        <input
          [(ngModel)]="search"
          class="w-full pl-10 pr-28 py-3 rounded-2xl border border-slate-200 bg-white shadow-sm focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 transition outline-none"
          placeholder="Search tests (CBC, thyroid, vitamin D…)"
        />
        <button
          type="button"
          class="absolute right-2 top-1/2 -translate-y-1/2 px-4 py-2 rounded-xl bg-indigo-700 hover:bg-indigo-800 text-white font-bold transition"
        >
          Search
        </button>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <select [(ngModel)]="sort" class="px-4 py-3 rounded-2xl border border-slate-200 bg-white shadow-sm outline-none">
        <option value="recommended">Recommended</option>
        <option value="rating">Top rated</option>
        <option value="price_low">Price: Low to High</option>
        <option value="price_high">Price: High to Low</option>
      </select>

      <button type="button" class="px-4 py-3 rounded-2xl border border-slate-200 bg-white shadow-sm hover:bg-slate-50 transition font-bold text-slate-700">
        Clear
      </button>
    </div>
  </div>

  <!-- Category chips -->
  <div class="flex items-center gap-2 overflow-x-auto pb-1">
    <button
      type="button"
      class="shrink-0 px-4 py-2 rounded-full border text-sm font-bold transition"
      [ngClass]="selectedCategoryId ? 'border-slate-200 bg-white text-slate-700 hover:bg-slate-50' : 'border-indigo-300 bg-indigo-50 text-indigo-800'"
      (click)="onCategoryChip('')"
    >
      All
    </button>
    <button
      *ngFor="let c of categories"
      type="button"
      class="shrink-0 px-4 py-2 rounded-full border text-sm font-bold transition"
      [ngClass]="selectedCategoryId === c.id ? 'border-indigo-300 bg-indigo-50 text-indigo-800' : 'border-slate-200 bg-white text-slate-700 hover:bg-slate-50'"
      (click)="onCategoryChip(c.id)"
    >
      {{ c.name }}
    </button>

    <label class="shrink-0 ml-auto inline-flex items-center gap-2 px-4 py-2 rounded-full border border-slate-200 bg-white text-sm font-bold text-slate-700">
      <input type="checkbox" [(ngModel)]="fastingOnly" />
      Fasting only
    </label>
  </div>

  <!-- Results -->
  <div *ngIf="!featured$">
    <app-empty-state
      icon="search_off"
      title="No tests found"
      subtitle="Try another keyword or clear filters."
      actionLabel="Clear filters"
      actionLink="/layout/tests"
    ></app-empty-state>
  </div>

  <ng-container *ngIf="featured$ | async as featured">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <app-test-card
        *ngFor="let t of featured; trackBy: trackById"
        [test]="t"
        (add)="add.emit($event)"
        (view)="view.emit($event)"
      ></app-test-card>
    </div>
  </ng-container>

 <app-pagination
    [page]="page"
    [size]="size"
    [totalItems]="totalItems"
    [pageSizeOptions]="[6, 10, 20, 50]"
    (pageChange)="onPageChange($event)"
    (sizeChange)="onSizeChange($event)"
  ></app-pagination>
</div>
