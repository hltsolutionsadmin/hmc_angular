<section class="space-y-4">
  <app-section-title
    title="Loved by patients"
    subtitle="Trust signals that build confidence and improve conversions."
  ></app-section-title>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    <div
      *ngFor="let t of testimonials"
      class="rounded-3xl border border-slate-200 bg-white shadow-sm p-5"
    >
      <div class="flex items-center gap-2">
        <div
          class="w-9 h-9 rounded-2xl bg-gradient-to-br from-slate-50 to-indigo-50 border border-slate-200 grid place-content-center"
        >
          <mat-icon class="text-indigo-700">person</mat-icon>
        </div>
        <p class="font-extrabold text-slate-900">{{ t.name }}</p>
      </div>
      <p class="mt-3 text-sm text-slate-600 leading-relaxed">“{{ t.text }}”</p>
    </div>
  </div>
</section>
