 
<section class='space-y-4'>  
  <app-section-title title='Shop by category' subtitle='Browse categories'></app-section-title>  
 
  <p *ngIf='loadingCategories' class='text-sm text-slate-500'>Loading categories...</p>  
  <p *ngIf='!loadingCategories && errorMessage' class='text-sm text-rose-600'>{{ errorMessage }}</p>  
 
  <div class='grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3'>  
    <button *ngFor='let c of categories' type='button' class='group w-full text-left rounded-2xl border border-slate-200 bg-white p-4 shadow-sm hover:shadow-md transition overflow-hidden' (click)='onCategoryClick(c)'>  
      <div class='flex items-start gap-3'>  
        <div class='shrink-0 w-11 h-11 rounded-2xl grid place-content-center bg-gradient-to-br from-emerald-50 to-sky-50 border border-slate-200'>  
          <mat-icon class='text-[22px] text-emerald-700'>category</mat-icon>  
        </div>  
        <div class='min-w-0'>  
          <p class='font-bold text-slate-900 leading-tight'>{{ c.name }}</p>  
          <p class='mt-1 text-xs text-slate-600'>{{ shortCategoryDescription(c) }}</p>  
        </div>  
      </div>  
    </button>  
  </div>  
</section> 
 
<section *ngIf='selectedCategory' class='mt-10 space-y-4'>  
  <app-section-title title='Products' subtitle='Showing all products (filter later)'></app-section-title>  
  <p *ngIf='loadingProducts' class='text-sm text-slate-500'>Loading products...</p>  
 
  <div class='grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4'>  
    <div *ngFor='let p of products' class='group rounded-3xl border border-slate-200 bg-white shadow-sm hover:shadow-md transition overflow-hidden'>  
      <div class='p-5'>  
        <p class='font-extrabold text-slate-900 line-clamp-2'>{{ p.name }} ({{ p.code }})</p>  
        <p class='mt-1 text-xs text-slate-600 line-clamp-1'>{{ productDescription(p) }}</p>  
        <div class='mt-3 flex flex-wrap items-center gap-2'>  
          <span class='text-[11px] px-2 py-1 rounded-full bg-slate-50 border border-slate-200 text-slate-700'>24 hrs</span>  
          <span class='text-[11px] px-2 py-1 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-700'>24 parameters</span>  
        </div>  
        <div class='mt-4 flex items-center gap-2'>  
          <p class='text-lg font-extrabold text-slate-900'>&#8377;{{ productPrice(p) }}</p>  
          <p class='text-sm text-slate-400 line-through'>&#8377;{{ crossedPrice(p) }}</p>  
        </div>  
      </div>  
    </div>  
  </div>  
</section>
