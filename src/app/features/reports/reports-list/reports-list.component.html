 <div class="h-full flex flex-col">
  <div class="flex-1 min-h-0 overflow-auto">
    <div class="container mx-auto p-4">
      <app-page-header title="Reports">
        <app-search-input
          placeholder="Search reports..."
          [(value)]="searchText"
        ></app-search-input>

        <app-ui-select
          placeholder="All Status"
          [options]="[
            { label: 'Pending', value: 'pending' },
            { label: 'Completed', value: 'completed' },
            { label: 'Rejected', value: 'rejected' }
          ]"
          [(value)]="statusFilter"
        ></app-ui-select>

        <app-ui-button label="Add Report" icon="add" (click)="add()"></app-ui-button>
      </app-page-header>
    </div>
    <div class="dashboard">
      <!-- Contenido principal -->
      <main class="main-content">
        <div class="content">                
          <!-- Resumen rápido -->
          <div class="quick-stats">
            <div class="stat-card">
              <div class="stat-icon" style="background-color: #4e73df;">
                <mat-icon>list</mat-icon>
              </div>
              <div class="stat-info">
                <h3>125</h3>
                <p>totales</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background-color: #1cc88a;">
                <mat-icon>check_circle</mat-icon>
              </div>
              <div class="stat-info">
                <h3>98</h3>
                <p>Completed</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background-color: #f6c23e;">
                <mat-icon>info</mat-icon>
              </div>
              <div class="stat-info">
                <h3>15</h3>
                <p>Pending</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background-color: #e74a3b;">
                <mat-icon>cancel</mat-icon>
              </div>
              <div class="stat-info">
                <h3>12</h3>
                <p>Rechazados</p>
              </div>
            </div>
          </div>

          <div *ngIf="!isMobile && viewMode === 'table'">
            <app-table
              [data]="filteredReportRows"
              [columns]="tableColumns"
              [actions]="tableActions"
              [itemsPerPage]="itemsPerPage"
              [statusClass]="reportStatusClass"
              (actionClicked)="onTableAction($event)"
            ></app-table>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>
