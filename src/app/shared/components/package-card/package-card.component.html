<div class="rounded-3xl border border-slate-200 bg-white shadow-sm hover:shadow-md transition overflow-hidden">
  <div class="p-5">
    <div class="flex items-start justify-between gap-4">
      <div class="min-w-0">
        <div class="flex items-center gap-2">
          <p class="font-extrabold text-slate-900 line-clamp-1">{{ pkg.name }}</p>
          <span *ngIf="pkg.highlight" class="text-[11px] px-2 py-1 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-200">
            {{ pkg.highlight }}
          </span>
        </div>
        <p class="mt-1 text-xs text-slate-600 line-clamp-2">{{ pkg.description }}</p>
      </div>
      <div class="shrink-0 w-11 h-11 rounded-2xl bg-gradient-to-br from-emerald-50 to-indigo-50 border border-slate-200 grid place-content-center">
        <mat-icon class="text-[22px] text-emerald-700">package_2</mat-icon>
      </div>
    </div>

    <div class="mt-4 flex flex-wrap items-center gap-2">
      <span class="text-[11px] px-2 py-1 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-700">
        {{ pkg.includesCount }} parameters
      </span>
      <span class="text-[11px] px-2 py-1 rounded-full bg-slate-50 border border-slate-200 text-slate-700">
        {{ pkg.reportTime }}
      </span>
    </div>

    <div class="mt-4 flex items-end justify-between gap-3">
      <div>
        <p class="text-lg font-extrabold text-slate-900">₹{{ priceToShow() }}</p>
        <p *ngIf="pkg.discountPrice" class="text-xs text-slate-400 line-through">₹{{ pkg.price }}</p>
      </div>
      <button
        type="button"
        (click)="onAdd()"
        class="inline-flex items-center gap-2 rounded-2xl px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold shadow-sm transition"
      >
        <mat-icon class="text-[18px]">add</mat-icon>
        Add
      </button>
    </div>
  </div>
</div>
