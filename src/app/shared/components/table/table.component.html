<div *ngIf="!isMobile" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
  <div class="overflow-x-auto">
    <table class="min-w-full">
      <thead class="bg-slate-50/60" style="background-color: rgb(248 250 252 / var(--tw-bg-opacity, 1));">
        <tr>
          <th
            *ngFor="let col of columns"
            class="px-6 py-4 text-[11px] font-semibold text-slate-500 uppercase tracking-wider"
            [ngClass]="getAlignmentClass(col.align || 'left')"
          >
            {{ col.label }}
          </th>

          <th
            *ngIf="actions.length > 0"
            class="px-6 py-4 text-right text-[11px] font-semibold text-slate-500 uppercase tracking-wider"
          >
            Actions
          </th>
        </tr>
      </thead>

      <tbody class="bg-white divide-y divide-slate-100">
        <tr
          *ngFor="let row of pagedItems"
          class="hover:bg-slate-50/70 transition-colors"
          [ngClass]="{ 'cursor-pointer': clickableRows }"
          (click)="onRowClick(row)"
        >
          <td
            *ngFor="let col of columns"
            class="px-4 py-2 whitespace-nowrap"
            [ngClass]="getAlignmentClass(col.align || 'left')"
          >
            <ng-container *ngIf="getCellTemplate(col.key) as tpl; else defaultCell">
              <ng-container
                [ngTemplateOutlet]="tpl"
                [ngTemplateOutletContext]="{ $implicit: row, row: row, col: col, value: getCellValue(row, col) }"
              ></ng-container>
            </ng-container>

            <ng-template #defaultCell>
              <ng-container [ngSwitch]="col.type">
                <!-- Price -->
                <ng-container *ngSwitchCase="'price'">
                  <span class="text-xm font-semibold text-slate-900">₹{{ getCellValue(row, col) }}</span>
                </ng-container>

                <!-- Status -->
                <ng-container *ngSwitchCase="'status'">
                  <span
                    [ngClass]="getStatusClass(getCellValue(row, col), row, col)"
                    class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                  >
                    {{ getStatusLabel(getCellValue(row, col), row, col) }}
                  </span>
                </ng-container>

                <!-- Default Text -->
                <ng-container *ngSwitchDefault>
                  <div class="text-xs text-neutral-700 truncate">
                    {{ getCellValue(row, col) }}
                  </div>
                </ng-container>
              </ng-container>
            </ng-template>
          </td>

          <td *ngIf="actions.length > 0" class="px-6 py-4 whitespace-nowrap text-right">
            <div class="flex justify-end gap-2">
              <button
                *ngFor="let btn of actions"
                (click)="onActionClick($event, btn.action, row)"
                class="inline-flex items-center gap-2 px-3 py-1.5 text-xs font-medium rounded-lg border transition-colors"
                [ngClass]="getDefaultActionButtonClass(btn)"
                [matTooltip]="getActionTooltip(btn, row)"
              >
                <ng-container *ngIf="btn.action === 'edit' || btn.action === 'delete'; else iconOnly">
                  <span>{{ btn.label }}</span>
                </ng-container>
                <ng-template #iconOnly>
                  <mat-icon class="text-[18px]">{{ getActionIcon(btn, row) }}</mat-icon>
                </ng-template>
              </button>
            </div>
          </td>
        </tr>

        <tr *ngIf="data.length === 0">
          <td [attr.colspan]="columns.length + (actions.length > 0 ? 1 : 0)" class="px-6 py-12 text-center text-gray-500">
            <mat-icon class="text-4xl opacity-30 mb-2">search_off</mat-icon>
            <p class="text-lg font-medium">No data found</p>
            <p class="text-sm">Try adjusting your search or filter to find what you're looking for.</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="bg-white px-6 py-4 flex items-center justify-between border-t border-slate-100">
    <div class="text-xs text-slate-500">
      Page {{ currentPage }} of {{ totalPages || 1 }}
    </div>

    <div class="flex items-center gap-2">
      <button
        (click)="goToPage(currentPage - 1)"
        [disabled]="currentPage === 1"
        class="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Prev
      </button>

      <ng-container *ngFor="let page of getPageNumbers()">
        <button
          *ngIf="page !== '...'"
          (click)="goToPage(+page)"
          class="min-w-8 px-3 py-1.5 text-xs rounded-lg border"
          [ngClass]="currentPage === +page ? 'border-blue-500 text-blue-600 bg-blue-50' : 'border-slate-200 text-slate-600 bg-white hover:bg-slate-50'"
        >
          {{ page }}
        </button>

        <span *ngIf="page === '...'" class="px-2 text-xs text-slate-400">…</span>
      </ng-container>

      <button
        (click)="goToPage(currentPage + 1)"
        [disabled]="currentPage === totalPages"
        class="px-3 py-1.5 text-xs rounded-lg border border-slate-200 bg-white text-slate-500 hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Next
      </button>
    </div>
  </div>
</div>
