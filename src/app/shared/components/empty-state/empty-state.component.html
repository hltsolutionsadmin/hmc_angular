<div class="rounded-3xl border border-slate-200 bg-white p-8 text-center shadow-sm">
  <div class="mx-auto w-14 h-14 rounded-2xl grid place-content-center bg-gradient-to-br from-slate-50 to-indigo-50 border border-slate-200">
    <mat-icon class="text-[28px] text-indigo-700">{{ icon }}</mat-icon>
  </div>
  <p class="mt-4 text-base font-extrabold text-slate-900">{{ title }}</p>
  <p *ngIf="subtitle" class="mt-1 text-sm text-slate-600">{{ subtitle }}</p>

  <a
    *ngIf="actionLabel && actionLink"
    [routerLink]="actionLink"
    class="inline-flex items-center justify-center mt-5 rounded-2xl px-5 py-2.5 bg-indigo-700 hover:bg-indigo-800 text-white font-bold shadow-sm transition"
  >
    {{ actionLabel }}
  </a>
</div>
