<div class="pagination-shell" *ngIf="totalPages > 0">
  <div class="pagination-info">
    <span>
      Showing
      <strong>{{ page * size + 1 }}</strong>
      -
      <strong>{{ minPage }}</strong>
      of
      <strong>{{ totalItems }}</strong>
    </span>

    <label class="page-size-control">
      <span>Rows per page</span>
      <select [value]="size" (change)="onPageSizeSelect($event)">
        <option *ngFor="let option of pageSizeOptions" [value]="option">
          {{ option }}
        </option>
      </select>
    </label>
  </div>

  <div class="pagination-nav">
    <button
      type="button"
      class="nav-btn"
      [disabled]="isFirstPage"
      (click)="goToPrevious()"
    >
      Prev
    </button>

    <div class="page-list">
      <button
        type="button"
        *ngFor="let p of pages; trackBy: trackByPage"
        class="page-btn"
        [class.active]="p === page"
        (click)="goToPage(p)"
      >
        {{ p + 1 }}
      </button>
    </div>

    <button
      type="button"
      class="nav-btn"
      [disabled]="isLastPage"
      (click)="goToNext()"
    >
      Next
    </button>
  </div>
</div>
