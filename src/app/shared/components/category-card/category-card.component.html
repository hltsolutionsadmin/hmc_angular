<button
  type="button"
  class="group w-full text-left rounded-2xl border border-slate-200 bg-white p-4 shadow-sm hover:shadow-md transition overflow-hidden"
  (click)="onClick()"
>
  <div class="flex items-start gap-3">
    <div class="shrink-0 w-11 h-11 rounded-2xl grid place-content-center bg-gradient-to-br from-emerald-50 to-sky-50 border border-slate-200">
      <mat-icon class="text-[22px] text-emerald-700 group-hover:text-indigo-700 transition">{{ category.icon }}</mat-icon>
    </div>
    <div class="min-w-0">
      <p class="font-bold text-slate-900 leading-tight">{{ category.name }}</p>
      <p class="mt-1 text-xs text-slate-600 line-clamp-2">{{ category.description }}</p>
    </div>
    <mat-icon class="ml-auto text-slate-300 group-hover:text-indigo-600 transition">chevron_right</mat-icon>
  </div>
</button>
