<div class="group rounded-3xl border border-slate-200 bg-white shadow-sm hover:shadow-lg transition-all duration-200 overflow-hidden">
  <div class="p-5">
    <div class="flex items-start gap-3">
      <div class="shrink-0 w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-50 to-emerald-50 border border-slate-200 grid place-content-center">
        <mat-icon class="text-[22px] text-blue-600">biotech</mat-icon>
      </div>

      <div class="min-w-0">
        <button type="button" class="text-left" (click)="onView()">
          <p class="font-extrabold text-slate-900 leading-snug line-clamp-2 group-hover:text-blue-700 transition">
            {{ test.name }}
          </p>
        </button>
        <p class="mt-1 text-xs text-slate-600 line-clamp-2">{{ test.description }}</p>

        <div class="mt-3 flex flex-wrap items-center gap-2">
          <span class="text-[11px] px-2 py-1 rounded-full bg-slate-50 border border-slate-200 text-slate-700 flex items-center gap-1">
            <mat-icon class="text-[12px]">schedule</mat-icon>
            {{ test.reportTime }}
          </span>
          <span *ngIf="test.fastingRequired" class="text-[11px] px-2 py-1 rounded-full bg-amber-50 border border-amber-200 text-amber-700">
            Fasting
          </span>
          <span *ngIf="test.parametersCount" class="text-[11px] px-2 py-1 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-700">
            {{ test.parametersCount }}
          </span>
        </div>
      </div>
    </div>

    <!-- Price row -->
    <div class="mt-4 flex items-center gap-2">
      <p class="text-lg font-extrabold text-slate-900">₹{{ priceToShow() }}</p>
      <p *ngIf="test.discountPrice" class="text-sm text-slate-400 line-through">₹{{ test.price }}</p>
      <span *ngIf="discountPercent() !== null" class="text-[11px] font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-1 rounded-full">
        {{ discountPercent() }}% OFF
      </span>
      <span *ngIf="test.rating" class="ml-auto inline-flex items-center gap-1 text-xs text-slate-500">
        <mat-icon class="text-[14px] text-amber-500">star</mat-icon>
        {{ test.rating }}
      </span>
    </div>

    <!-- CTA buttons row -->
    <div class="mt-3 flex items-center gap-2">

      <!-- Book Now — primary CTA (booking mode) -->
      <button
        *ngIf="bookingMode"
        type="button"
        (click)="onBookNow()"
        class="flex-1 flex items-center justify-center gap-1.5 rounded-2xl px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-sm shadow-sm transition"
      >
        <mat-icon class="text-[16px]">event_available</mat-icon>
        Book Now
      </button>

      <!-- Add to Cart — fallback / secondary -->
      <ng-container *ngIf="!bookingMode">
        <ng-container *ngIf="(productIdsInCart$ | async) as ids">
          <button
            *ngIf="!ids.has(test.id); else inCart"
            type="button"
            (click)="onAdd()"
            [disabled]="(cartLoading$ | async) === true"
            class="flex-1 inline-flex items-center justify-center gap-2 rounded-2xl px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold shadow-sm transition disabled:opacity-60 disabled:cursor-not-allowed"
          >
            <mat-icon class="text-[18px]">add_shopping_cart</mat-icon>
            Add
          </button>

          <ng-template #inCart>
            <button
              type="button"
              disabled
              class="flex-1 inline-flex items-center justify-center gap-2 rounded-2xl px-4 py-2.5 bg-slate-100 text-slate-700 font-bold border border-slate-200"
            >
              <mat-icon class="text-[18px] text-emerald-600">check_circle</mat-icon>
              In Cart
            </button>
          </ng-template>
        </ng-container>
      </ng-container>

      <!-- Trust badge chip -->
      <span *ngIf="test.trustBadges?.length" class="shrink-0 inline-flex items-center gap-1 text-[11px] text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-2 rounded-2xl font-bold">
        <mat-icon class="text-[13px]">verified</mat-icon>
        NABL
      </span>

    </div>
  </div>

  <!-- Hover stripe -->
  <div class="h-1 bg-gradient-to-r from-blue-500 via-blue-600 to-indigo-600 opacity-0 group-hover:opacity-100 transition"></div>
</div>
