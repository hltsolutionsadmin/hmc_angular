<div class="relative rounded-3xl overflow-hidden border border-slate-200 bg-white shadow-sm hover:shadow-md transition">
  <div class="absolute inset-0 bg-gradient-to-br opacity-[0.12]" [ngClass]="themeClass()"></div>
  <div class="relative p-5">
    <p class="text-sm font-extrabold text-slate-900">{{ offer.title }}</p>
    <p class="mt-1 text-xs text-slate-600">{{ offer.description }}</p>

    <div class="mt-3 flex items-center justify-between gap-3">
      <span *ngIf="offer.code" class="text-[11px] font-bold px-2.5 py-1.5 rounded-full bg-slate-900 text-white">
        {{ offer.code }}
      </span>
      <span *ngIf="!offer.code" class="text-[11px] font-semibold px-2.5 py-1.5 rounded-full bg-slate-50 border border-slate-200 text-slate-700">
        Limited time
      </span>

      <span *ngIf="offer.ctaLabel" class="text-[11px] font-bold text-indigo-700">{{ offer.ctaLabel }}</span>
    </div>
  </div>
</div>
