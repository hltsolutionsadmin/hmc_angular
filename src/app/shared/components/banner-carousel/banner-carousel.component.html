<div class="relative overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm">
  <div class="absolute inset-0 bg-gradient-to-br opacity-[0.12]" [ngClass]="themeClass((banners[active]?.theme || 'blue'))"></div>
  <div class="relative p-6 sm:p-8">
    <div class="flex items-center justify-between gap-6">
      <div class="min-w-0">
        <div class="inline-flex items-center gap-2 text-[11px] font-semibold text-emerald-800 bg-emerald-50 border border-emerald-200 px-3 py-1 rounded-full">
          <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
          Trusted medical bookings
        </div>

        <ng-container *ngFor="let b of banners; let i = index">
          <div *ngIf="i === active" class="mt-4" [@slideFade]>
            <h1 class="text-2xl sm:text-4xl font-extrabold tracking-tight text-slate-900">
              {{ b.title }}
            </h1>
            <p class="mt-2 text-sm sm:text-base text-slate-600 max-w-2xl">
              {{ b.subtitle }}
            </p>

            <div class="mt-5 flex flex-wrap items-center gap-3">
              <a
                *ngIf="b.ctaLabel && b.ctaLink"
                [routerLink]="b.ctaLink"
                class="inline-flex items-center gap-2 rounded-xl px-4 py-2.5 bg-indigo-700 hover:bg-indigo-800 text-white font-semibold shadow-sm transition"
              >
                {{ b.ctaLabel }}
                <mat-icon class="text-[18px]">arrow_forward</mat-icon>
              </a>
              <div class="inline-flex items-center gap-2 text-xs text-slate-600">
                <mat-icon class="text-[18px] text-emerald-600">verified</mat-icon>
                NABL-accredited partner labs
              </div>
              <div class="inline-flex items-center gap-2 text-xs text-slate-600">
                <mat-icon class="text-[18px] text-sky-600">home</mat-icon>
                Free home collection
              </div>
            </div>
          </div>
        </ng-container>
      </div>

      <div class="hidden md:flex flex-col gap-3 shrink-0">
        <div class="w-40 h-40 rounded-3xl bg-white/70 border border-slate-200 shadow-sm grid place-content-center">
          <mat-icon class="text-[56px] text-emerald-600">medical_services</mat-icon>
        </div>
        <div class="w-40 h-16 rounded-2xl bg-white/70 border border-slate-200 shadow-sm px-4 grid place-content-center">
          <p class="text-xs text-slate-600 font-semibold">Reports in 24–48 hrs</p>
        </div>
      </div>
    </div>

    <div class="mt-6 flex items-center gap-2">
      <button
        *ngFor="let b of banners; let i = index"
        type="button"
        (click)="setActive(i)"
        class="h-2 rounded-full transition-all"
        [ngClass]="i === active ? 'w-10 bg-indigo-700' : 'w-2 bg-slate-300 hover:bg-slate-400'"
        [attr.aria-label]="'Banner ' + (i + 1)"
      ></button>
    </div>
  </div>
</div>
