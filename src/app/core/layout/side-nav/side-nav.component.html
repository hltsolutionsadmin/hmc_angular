<nav
  id="sidebar"
  class="w-64 bg-white border-r border-neutral-200 flex flex-col transition-all duration-300 h-full"
>
  <div
    id="sidebar-header"
    class="flex items-center h-16 px-6 border-b border-neutral-200 shrink-0"
  >
    <img src="/assets/favicon.svg" width="50px" alt="logo">
    <span class="ml-3 text-lg font-bold text-neutral-800">HMC</span>
  </div>

  <div
    id="employee-sidebar-menu"
    class="flex-grow p-4 overflow-y-auto"
  >
    <ul class="space-y-1">
      <!-- Catalog -->
      <li>
        <button
          type="button"
          (click)="toggleCatalog()"
          [class.bg-neutral-100]="isActive('/layout/tests')"
          class="flex items-center justify-between w-full px-4 py-2.5 text-sm font-medium text-neutral-700 hover:bg-neutral-100 rounded-lg transition"
        >
          <span class="flex items-center">
            <mat-icon class="mr-3 text-[20px]">category</mat-icon>
            Catalog
          </span>
          <mat-icon class="text-[18px] transition-transform duration-200" [class.rotate-180]="isCatalogOpen">expand_more</mat-icon>
        </button>

        <div class="ml-4 overflow-hidden transition-all duration-300" [class.max-h-0]="!isCatalogOpen" [class.max-h-96]="isCatalogOpen">
          <ul class="mt-1 space-y-1">
            <li>
              <a
                routerLink="/layout/tests/categories"
                routerLinkActive="bg-neutral-100 text-primary"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center px-4 py-2 text-sm font-medium text-neutral-600 hover:bg-neutral-100 rounded-lg transition"
              >
                <mat-icon class="mr-3 text-[18px]">label</mat-icon>
                Categories
              </a>
            </li>
            <li>
              <a
                routerLink="/layout/tests"
                routerLinkActive="bg-neutral-100 text-primary"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center px-4 py-2 text-sm font-medium text-neutral-600 hover:bg-neutral-100 rounded-lg transition"
              >
                <mat-icon class="mr-3 text-[18px]">inventory_2</mat-icon>
                Products
              </a>
            </li>
            <li>
              <a
                routerLink="/layout/orders"
                routerLinkActive="bg-neutral-100 text-primary"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center px-4 py-2 text-sm font-medium text-neutral-600 hover:bg-neutral-100 rounded-lg transition"
              >
                <mat-icon class="mr-3 text-[18px]">payments</mat-icon>
                Pricing
              </a>
            </li>
            <li>
              <a
                routerLink="/layout/reports"
                routerLinkActive="bg-neutral-100 text-primary"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center px-4 py-2 text-sm font-medium text-neutral-600 hover:bg-neutral-100 rounded-lg transition"
              >
                <mat-icon class="mr-3 text-[18px]">library_books</mat-icon>
                Catalogs
              </a>
            </li>
          </ul>
        </div>
      </li>

      <!-- Inventory -->
      <li>
        <button
          type="button"
          (click)="toggleInventory()"
          class="flex items-center justify-between w-full px-4 py-2.5 text-sm font-medium text-neutral-700 hover:bg-neutral-100 rounded-lg transition"
        >
          <span class="flex items-center">
            <mat-icon class="mr-3 text-[20px]">warehouse</mat-icon>
            Inventory
          </span>
          <mat-icon class="text-[18px] transition-transform duration-200" [class.rotate-180]="isInventoryOpen">expand_more</mat-icon>
        </button>
        <div class="ml-4 overflow-hidden transition-all duration-300" [class.max-h-0]="!isInventoryOpen" [class.max-h-56]="isInventoryOpen">
          <ul class="mt-1 space-y-1">
            <li>
              <a
                routerLink="/layout/orders"
                routerLinkActive="bg-neutral-100 text-primary"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center px-4 py-2 text-sm font-medium text-neutral-600 hover:bg-neutral-100 rounded-lg transition"
              >
                <mat-icon class="mr-3 text-[18px]">add_box</mat-icon>
                Add Stock
              </a>
            </li>
          </ul>
        </div>
      </li>

      <!-- Marketing -->
      <li>
        <button
          type="button"
          (click)="toggleMarketing()"
          class="flex items-center justify-between w-full px-4 py-2.5 text-sm font-medium text-neutral-700 hover:bg-neutral-100 rounded-lg transition"
        >
          <span class="flex items-center">
            <mat-icon class="mr-3 text-[20px]">campaign</mat-icon>
            Marketing
          </span>
          <mat-icon class="text-[18px] transition-transform duration-200" [class.rotate-180]="isMarketingOpen">expand_more</mat-icon>
        </button>
        <div class="ml-4 overflow-hidden transition-all duration-300" [class.max-h-0]="!isMarketingOpen" [class.max-h-56]="isMarketingOpen">
          <ul class="mt-1 space-y-1">
            <li>
              <a
                routerLink="/layout/reports"
                routerLinkActive="bg-neutral-100 text-primary"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center px-4 py-2 text-sm font-medium text-neutral-600 hover:bg-neutral-100 rounded-lg transition"
              >
                <mat-icon class="mr-3 text-[18px]">local_offer</mat-icon>
                Promotion
              </a>
            </li>
          </ul>
        </div>
      </li>
    </ul>
  </div>
  <div id="sidebar-footer" class="p-4 border-t border-neutral-200 space-y-1">
    <a
      href="#"
      class="flex items-center px-4 py-2.5 text-sm font-medium text-neutral-600 hover:bg-neutral-100 rounded-lg"
    >
      <mat-icon class="w-5 mr-3 text-[20px]">settings</mat-icon>
      Settings
    </a>
    <button
      type="button"
      class="w-full flex items-center px-4 py-2.5 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg"
    >
      <mat-icon class="w-5 mr-3 text-[20px]">logout</mat-icon>
      Logout
    </button>
  </div>
</nav>
