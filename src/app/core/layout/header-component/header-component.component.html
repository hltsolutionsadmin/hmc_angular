<header
  id="header"
  class="flex items-center h-16 bg-white border-b border-neutral-200 px-8 shrink-0"
>
  <div class="ml-auto flex items-center space-x-6">
    <!-- <button
      type="button"
      class="inline-flex items-center gap-2 text-xs text-neutral-600 border border-neutral-200 rounded-lg px-3 py-2 bg-white cursor-default"
      disabled
    >
      <span>
       Company admin view
      </span>
    </button> -->
    <button class="relative text-neutral-500 hover:text-primary">
      <mat-icon class="text-[22px]">notifications</mat-icon>
      <span class="absolute -top-1 -right-1 flex h-2 w-2">
        <span
          class="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent opacity-75"
        ></span>
        <span
          class="relative inline-flex rounded-full h-2 w-2 bg-accent"
        ></span>
      </span>
    </button>
    <button
      type="button"
      class="flex items-center space-x-3 group"
    >
      <img
        src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-1.jpg"
        alt="User Avatar"
        class="w-9 h-9 rounded-full object-cover"
      />
      <div class="text-left">
        <p class="text-sm font-semibold text-neutral-800 group-hover:text-primary">
          {{ userDisplayName || 'User' }}
        </p>
        <p class="text-xs text-neutral-500">
          {{ userPrimaryRole || 'Administrator' }}
        </p>
      </div>
      <mat-icon class="text-neutral-400 group-hover:text-primary text-[18px]">chevron_right</mat-icon>
    </button>
  </div>
</header>
