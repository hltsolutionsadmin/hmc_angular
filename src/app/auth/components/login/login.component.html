<div class="min-h-screen flex bg-gray-50" [@pageFade]>

  <!-- ==================== LEFT – CAROUSEL ==================== -->
  <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-indigo-600 to-indigo-800 relative overflow-hidden">
    <div class="absolute inset-0 bg-black/20"></div>
    <div class="relative z-10 flex flex-col justify-center items-center w-full px-12 text-white">
      <ng-container *ngFor="let quote of quotes; let i = index">
        <div *ngIf="i === currentIdx"
          class="absolute inset-0 flex flex-col justify-center items-center text-center px-8" [@quoteFade]>
          <h2 class="text-4xl md:text-5xl font-bold mb-6 leading-tight">
            “{{ quote.text }}”
          </h2>
          <p class="text-lg opacity-90">- {{ quote.author }} -</p>
        </div>
      </ng-container>

      <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex space-x-2">
        <button *ngFor="let q of quotes; let i = index" (click)="currentIdx = i" [class]="'w-2 h-2 rounded-full transition-all duration-300 ' +
                   (i === currentIdx ? 'bg-white w-8' : 'bg-white/50')"></button>
      </div>
    </div>
  </div>

  <div class="flex-1 flex items-center justify-center p-6 lg:p-12" [@formSlide]>
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-indigo-700">Clinic Portal</h1>
        <p class="text-sm text-gray-600 mt-1">Secure access for staff &amp; doctors</p>
      </div>

      <div *ngIf="errorMessage" class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ errorMessage }}
      </div>
      <div *ngIf="infoMessage" class="mb-4 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">
        {{ infoMessage }}
      </div>

      <!-- Reactive Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

        <!-- Email -->
        <label class="block text-sm font-medium text-gray-900">Email</label>
        <div class="flex" style="margin-top: 10px !important;" [@shake]="shouldShakeControl(loginForm.get('username'))">
          <span
            class="inline-flex items-center px-3 text-sm bg-gray-200 border rounded-s-md"
            [ngClass]="getInputState('username')">
            <mat-icon [ngClass]="getInputState('username')">mail</mat-icon>
          </span>
          <input
            type="email"
            formControlName="username"
            class="rounded-none bg-gray-50 border text-gray-900 block flex-1 min-w-0 w-full text-sm p-3.5"
            placeholder="name@example.com">
        </div>
        <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="text-red-500 text-xs mt-1" style="margin: 0 !important;">
          <span *ngIf="loginForm.get('username')?.errors?.['required']">Email is required.</span>
          <span *ngIf="loginForm.get('username')?.errors?.['email']">Enter a valid email.</span>
        </div>
         <label class="block text-sm font-medium text-gray-900">Password</label>
        <div class="flex" style="margin-top: 10px !important;" [@shake]="shouldShakeControl(loginForm.get('password'))">
          <span
            class="inline-flex items-center px-3 text-sm bg-gray-200 border rounded-s-md">
            <mat-icon [ngClass]="getInputState('password')">lock</mat-icon>
          </span>
          <input
            type="password"
            formControlName="password"
            class="rounded-none bg-gray-50 border text-gray-900 block flex-1 min-w-0 w-full text-sm p-3.5"
            placeholder="Enter Password">
        </div>

        <button class="cssbuttons-io-button">
  login
  <div class="icon">
    <svg
      height="24"
      width="24"
      viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path d="M0 0h24v24H0z" fill="none"></path>
      <path
        d="M16.172 11l-5.364-5.364 1.414-1.414L20 12l-7.778 7.778-1.414-1.414L16.172 13H4v-2z"
        fill="currentColor"
      ></path>
    </svg>
  </div>
</button>

      </form>

      <p class="mt-5 text-center text-sm text-gray-600">
        Don't have an account?
        <a routerLink="/register" class="text-indigo-700 font-semibold hover:underline">Please register</a>
      </p>

      <p class="mt-6 text-center text-xs text-gray-500">
        Copyright {{ getYear() }} Clinic Solutions. All rights reserved.
      </p>
    </div>
  </div>
</div>
