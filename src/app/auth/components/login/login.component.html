<div class="min-h-screen flex bg-gray-50" [@pageFade]>

  <!-- ==================== LEFT – CAROUSEL ==================== -->
  <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-indigo-600 to-indigo-800 relative overflow-hidden">
    <div class="absolute inset-0 bg-black/20"></div>
    <div class="relative z-10 flex flex-col justify-center items-center w-full px-12 text-white">
      <ng-container *ngFor="let quote of quotes; let i = index">
        <div *ngIf="i === currentIdx"
          class="absolute inset-0 flex flex-col justify-center items-center text-center px-8" [@quoteFade]>
          <h2 class="text-4xl md:text-5xl font-bold mb-6 leading-tight">
            “{{ quote.text }}”
          </h2>
          <p class="text-lg opacity-90">- {{ quote.author }} -</p>
        </div>
      </ng-container>

      <div class="absolute bottom-10 left-1/2 -translate-x-1/2 flex space-x-2">
        <button *ngFor="let q of quotes; let i = index" (click)="currentIdx = i" [class]="'w-2 h-2 rounded-full transition-all duration-300 ' +
                   (i === currentIdx ? 'bg-white w-8' : 'bg-white/50')"></button>
      </div>
    </div>
  </div>

  <div class="flex-1 flex items-center justify-center p-6 lg:p-12" [@formSlide]>
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-indigo-700">Hmc Portal</h1>
        <p class="text-sm text-gray-600 mt-1">Secure access for staff &amp; doctors</p>
      </div>

      <div *ngIf="errorMessage" class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ errorMessage }}
      </div>
      <div *ngIf="infoMessage" class="mb-4 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">
        {{ infoMessage }}
      </div>

      <!-- Reactive Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Mobile + Send OTP -->
        <label class="block text-sm font-medium text-gray-900">Mobile Number</label>
        <div class="flex relative" style="margin-top: 10px !important;" [@shake]="shouldShakeControl(loginForm.get('primaryContact'))">
          <span
            class="inline-flex items-center px-3 text-sm bg-gray-200 border rounded-s-md"
            [ngClass]="getInputState('primaryContact')">
            <mat-icon [ngClass]="getInputState('primaryContact')">phone</mat-icon>
          </span>
          <input
            type="tel"
            formControlName="primaryContact"
            [readonly]="mobileLocked"
            maxlength="10"
            inputmode="numeric"
            pattern="[0-9]*"
            (input)="onMobileInput($event)"
            class="rounded-none bg-gray-50 border text-gray-900 block flex-1 min-w-0 w-full text-sm p-3.5 pr-28"
            placeholder="Enter mobile number">

          <button
            type="button"
            (click)="onSendOtpOrEdit()"
            [disabled]="sendingOtp || (!mobileLocked && loginForm.get('primaryContact')?.invalid)"
            class="absolute right-2 top-1/2 -translate-y-1/2 rounded-lg bg-indigo-700 px-3 py-2 text-xs font-semibold text-white hover:bg-indigo-800 disabled:cursor-not-allowed disabled:opacity-60">
            {{ sendingOtp ? 'Sending...' : (mobileLocked ? 'Edit' : 'Send OTP') }}
          </button>
        </div>
        <div *ngIf="loginForm.get('primaryContact')?.invalid && loginForm.get('primaryContact')?.touched" class="text-red-500 text-xs mt-1" style="margin: 0 !important;">
          <span *ngIf="loginForm.get('primaryContact')?.errors?.['required']">Mobile number is required.</span>
          <span *ngIf="loginForm.get('primaryContact')?.errors?.['pattern']">Enter a valid 10-digit mobile number.</span>
        </div>

        <!-- OTP boxes (always visible) -->
        <ng-container *ngIf="sendingOtp || mobileLocked">
          <label class="block text-sm font-medium text-gray-900">OTP</label>
          <div class="w-full" (paste)="onOtpPaste($event)">
            <div formArrayName="otp" class="flex items-center justify-between gap-2">
              <input
                *ngFor="let _ of otpArray.controls; let i = index"
                [id]="'otp-' + i"
                [formControlName]="i"
                maxlength="1"
                inputmode="numeric"
                pattern="[0-9]*"
                (input)="onOtpInput(i, $event)"
                (keydown)="onOtpKeydown(i, $event)"
                class="h-12 w-12 rounded-xl border bg-gray-50 text-center text-lg font-semibold text-gray-900 focus:outline-none"
                [ngClass]="getOtpInputState(i)"
                [attr.aria-label]="'OTP digit ' + (i + 1)"
              />
            </div>
            <div *ngIf="otpArray.invalid && (otpArray.dirty || otpArray.touched)" class="text-red-500 text-xs mt-1" style="margin: 0 !important;">
              Enter the full OTP.
            </div>
          </div>
        </ng-container>

        <button class="cssbuttons-io-button" [disabled]="loading || !mobileLocked || otpArray.invalid">
          {{ loading ? 'login...' : 'login' }}
          <div class="icon">
            <svg height="24" width="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 0h24v24H0z" fill="none"></path>
              <path
                d="M16.172 11l-5.364-5.364 1.414-1.414L20 12l-7.778 7.778-1.414-1.414L16.172 13H4v-2z"
                fill="currentColor"
              ></path>
            </svg>
          </div>
        </button>

      </form>

      <p class="mt-6 text-center text-xs text-gray-500">
        Copyright {{ getYear() }} Clinic Solutions. All rights reserved.
      </p>
    </div>
  </div>
</div>
